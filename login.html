<!DOCTYPE html>
<html>
<head>
    <title>Login - Premium Insurance</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            width: 350px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            color: #dcdde1;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #00cec9;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #00b894;
        }

        a {
            color: #00cec9;
            text-decoration: none;
        }

        .footer {
            margin-top: 15px;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🔐 Login</h1>
    <p>Welcome to Premium Insurance Calculator</p>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="footer">
        <p>Don't have an account? <a href="/register">Register</a></p>
    </div>
</div>

</body>
</html>
